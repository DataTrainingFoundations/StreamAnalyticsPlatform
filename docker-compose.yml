# StreamFlow Analytics Platform - Docker Compose Stack
# All components run in Docker containers

services:
  # =============================================================================
  # ZOOKEEPER (Required for Confluent Kafka)
  # =============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamflow-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
        disable: true
    networks:
      - streamflow-network

  # =============================================================================
  # KAFKA (Confluent Platform)
  # =============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamflow-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      zookeeper:
        condition: service_started
    networks:
      - streamflow-network

  # =============================================================================
  # KAFKA UI (For Debugging/Monitoring)
  # =============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streamflow-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=streamflow
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - streamflow-network

  # =============================================================================
  # MINIO (For S3-Compatible Object Storage)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    env_file:
      - .env
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Web UI
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - streamflow-network

  # =============================================================================
  # SPARK (Master + Worker) - Using official Apache Spark image
  # =============================================================================
  # Init container to set up volume permissions
  spark-init:
    image: busybox
    container_name: streamflow-spark-init
    command: [ "sh", "-c", "mkdir -p /opt/spark-data/landing /opt/spark-data/gold && chmod -R 777 /opt/spark-data" ]
    volumes:
      - spark_data:/opt/spark-data
    networks:
      - streamflow-network

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: streamflow-spark-master
    user: root
    ports:
      - "7077:7077"
      - "8081:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    command: [ "/opt/spark/sbin/start-master.sh" ]
    volumes:
      - ./jobs:/opt/spark-jobs
      - spark_data:/opt/spark-data
      - .:/workspace
    depends_on:
      spark-init:
        condition: service_completed_successfully
    networks:
      - streamflow-network
    

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    user: root
    depends_on:
      spark-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=12G
      - SPARK_WORKER_CORES=6
      - SPARK_NO_DAEMONIZE=true
    command: [ "/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077" ]
    volumes:
      - ./jobs:/opt/spark-jobs
      - spark_data:/opt/spark-data
    networks:
      - streamflow-network

  # =============================================================================
  # POSTGRES (for concurrency with Airflow)
  # =============================================================================
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamflow-network

  # =============================================================================
  # AIRFLOW (Custom Image with Spark Client)
  # =============================================================================
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: streamflow-airflow
    env_file:
      - .env
    # Run as root to match Spark container permissions for shared volume access
    user: root
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./jobs:/opt/airflow/jobs
      - ./util:/opt/airflow/util
      - spark_data:/opt/spark-data
      - airflow_logs:/opt/airflow/logs
      - airflow_data:/opt/airflow
    command: standalone
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    networks:
      - streamflow-network

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================
networks:
  streamflow-network:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  airflow_data:
  airflow_logs:
  spark_data:
  minio_data:
  postgres_data: